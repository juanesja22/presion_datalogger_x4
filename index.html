<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>E-Skids · PRESIÓN DATALOGGER X4</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080b10;
  --surface: #0d1117;
  --border:  #1a2332;
  --s1:      #00d4ff;
  --s2:      #ff6b2b;
  --s3:      #00e676;
  --s4:      #ce93d8;
  --neg:     #ff3860;
  --text:    #c9d8ea;
  --dim:     #3d5166;
  --warn:    #ffd600;
  --radius:  12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'DM Mono',monospace;
  min-height:100vh; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);
  background-size:32px 32px; pointer-events:none;
}

header {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(13,17,23,0.95);
  backdrop-filter:blur(12px);
  flex-wrap:wrap; gap:10px;
}
.logo {
  font-family:'Orbitron',monospace;
  font-size:14px; font-weight:900;
  letter-spacing:3px; color:var(--s1); text-transform:uppercase;
}
.header-right { display:flex; align-items:center; gap:14px; }

#btn-ble {
  background:transparent; border:1px solid var(--s1); color:var(--s1);
  padding:7px 16px; font-family:'Orbitron',monospace; font-size:10px;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}

main {
  position:relative; z-index:1;
  display:grid; grid-template-columns: 1fr 1fr;
  gap:16px; padding:16px;
  max-width:980px; margin:0 auto;
}

.sensor-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px;
  display:flex; flex-direction:column; gap:14px;
}
.sensor-card.s1 { --accent:var(--s1); }
.sensor-card.s2 { --accent:var(--s2); }
.sensor-card.s3 { --accent:var(--s3); }
.sensor-card.s4 { --accent:var(--s4); }

.card-title { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:3px; color:var(--dim); }

/* AJUSTE: Gauge y números alineados a la IZQUIERDA */
.gauge-wrap { display:flex; flex-direction:column; align-items: flex-start; gap:8px; }
.gauge-svg { width:100%; max-width:180px; margin-left: -10px; } /* Ajuste de margen para compensar el arco */
.gauge-nums { display:flex; justify-content: flex-start; width: 100%; }

.gnum .val { font-family:'Orbitron',monospace; font-size:28px; font-weight:700; color:var(--accent); }
.gnum .unit { font-size:11px; color:var(--dim); letter-spacing:2px; }

.chart-title { font-size:9px; letter-spacing:2px; color:var(--dim); margin-bottom:6px; }
canvas.chart { width:100%; height:80px; display:block; }

.log-panel { grid-column: 1 / -1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.log-header { display:flex; justify-content:space-between; margin-bottom:14px; align-items:center; }
.btn-log { background:transparent; border:1px solid var(--dim); color:var(--dim); padding:6px 12px; font-size:9px; cursor:pointer; }
.btn-log.active { border-color:var(--s3); color:var(--s3); }

.log-table-wrap { max-height:250px; overflow-y:auto; }
.log-table { width:100%; border-collapse:collapse; font-size:12px; }
.log-table th { text-align:left; padding:8px; color:var(--dim); border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); }
.log-table td { padding:8px; border-bottom:1px solid rgba(26,35,50,0.5); }

@media(max-width:640px) { main { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">E-SKIDS · PRESIÓN</div>
  <div class="header-right">
    <button id="btn-ble">Conectar</button>
  </div>
</header>

<main>
  <script>
    const sensors = [
      { id: 1, label: 'SENSOR 1', color: 'var(--s1)' },
      { id: 2, label: 'SENSOR 2', color: 'var(--s2)' },
      { id: 3, label: 'SENSOR 3', color: 'var(--s3)' },
      { id: 4, label: 'SENSOR 4', color: 'var(--s4)' }
    ];
    
    sensors.forEach(s => {
      document.write(`
        <div class="sensor-card s${s.id}">
          <div class="card-title">// ${s.label}</div>
          <div class="gauge-wrap">
            <svg class="gauge-svg" viewBox="0 0 220 130">
              <path id="g${s.id}-bg" fill="none" stroke="#1a2332" stroke-width="14" stroke-linecap="round"/>
              <path id="g${s.id}-pos" fill="none" stroke="${s.color}" stroke-width="14" stroke-linecap="round"/>
              <line id="g${s.id}-needle" x1="110" y1="110" x2="110" y2="44" stroke="white" stroke-width="2" style="transform-origin:110px 110px; transition:transform 0.4s;"/>
              <text x="10" y="124" fill="#3d5166" font-size="9">-20</text>
              <text x="175" y="124" fill="#3d5166" font-size="9">200</text>
            </svg>
            <div class="gauge-nums">
              <div class="gnum">
                <div class="val" id="s${s.id}-inwc">0.0</div>
                <div class="unit">inWC</div>
              </div>
            </div>
          </div>
          <div class="chart-wrap">
            <div class="chart-title">// HISTORIAL</div>
            <canvas class="chart" id="chart${s.id}"></canvas>
          </div>
        </div>
      `);
    });
  </script>

  <div class="log-panel">
    <div class="log-header">
      <div class="card-title">// DATALOGGER VIRTUAL</div>
      <div class="header-right">
        <button class="btn-log active" id="btn-log-toggle">● GRABANDO</button>
        <button class="btn-log" id="btn-export">EXPORTAR CSV</button>
      </div>
    </div>
    <div class="log-table-wrap">
      <table class="log-table">
        <thead>
          <tr>
            <th>Hora</th>
            <th>S1 (inWC)</th>
            <th>S2 (inWC)</th>
            <th>S3 (inWC)</th>
            <th>S4 (inWC)</th>
          </tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const SVC = '12345678-1234-1234-1234-123456789abc';
const CHARS = [
  '12345678-1234-1234-1234-123456789ab1',
  '12345678-1234-1234-1234-123456789ab2',
  '12345678-1234-1234-1234-123456789ab3',
  '12345678-1234-1234-1234-123456789ab4'
];

const P_MIN = -20, P_MAX = 200;
let lastS = [0, 0, 0, 0];
let logData = [];
let grabando = true;

// Gauges
function updateGauge(idx, val) {
  const n = idx + 1;
  const clamped = Math.max(P_MIN, Math.min(P_MAX, val));
  const deg = 180 - ((clamped - P_MIN) / (P_MAX - P_MIN)) * 180;
  document.getElementById(`g${n}-needle`).style.transform = `rotate(${90 - deg}deg)`;
  
  const arcPath = (v) => {
    const angle = 180 - ((v - P_MIN) / (P_MAX - P_MIN)) * 180;
    const rad = angle * Math.PI / 180;
    const x = 110 + 80 * Math.cos(rad);
    const y = 110 - 80 * Math.sin(rad);
    return `M30 110 A80 80 0 0 1 ${x} ${y}`;
  };
  document.getElementById(`g${n}-pos`).setAttribute('d', arcPath(clamped));
  document.getElementById(`s${n}-inwc`).textContent = val.toFixed(1);
}

// Inicializar fondos de gauges
for(let i=1; i<=4; i++) {
  document.getElementById(`g${i}-bg`).setAttribute('d', `M30 110 A80 80 0 0 1 190 110`);
}

async function conectar() {
  try {
    const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SVC] }] });
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SVC);
    
    for (let i = 0; i < 4; i++) {
      const char = await service.getCharacteristic(CHARS[i]);
      await char.startNotifications();
      char.addEventListener('characteristicvaluechanged', e => {
        const val = e.target.value.getFloat32(0, true);
        lastS[i] = val;
        updateGauge(i, val);
      });
    }
    document.getElementById('btn-ble').textContent = "CONECTADO";
  } catch(e) { console.error(e); }
}

// Datalogger simple
setInterval(() => {
  if(!grabando || lastS.every(v => v === 0)) return;
  const now = new Date().toLocaleTimeString();
  const reg = { hora: now, s1: lastS[0], s2: lastS[1], s3: lastS[2], s4: lastS[3] };
  logData.push(reg);
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${now}</td><td>${reg.s1.toFixed(2)}</td><td>${reg.s2.toFixed(2)}</td><td>${reg.s3.toFixed(2)}</td><td>${reg.s4.toFixed(2)}</td>`;
  document.getElementById('log-tbody').appendChild(tr);
}, 2000);

document.getElementById('btn-ble').addEventListener('click', conectar);
document.getElementById('btn-log-toggle').addEventListener('click', () => {
  grabando = !grabando;
  document.getElementById('btn-log-toggle').textContent = grabando ? "● GRABANDO" : "○ PAUSADO";
});
</script>
</body>
</html>
